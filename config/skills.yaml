# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Seeker.Bot — Skills Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Toggle skills on/off by setting enabled: true/false
# Core skills are required and cannot be disabled.
#
# This file is generated by install.bat, but you can
# edit it manually at any time. Restart the bot to apply.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# 🟢 CORE — Required for Seeker to function
core:
  health_monitor: true       # System health dashboard
  self_improvement: true     # S.A.R.A. — self-healing every 6h
  briefing: true             # Daily briefing at 7am

# 🟡 RECOMMENDED — Enhance your daily experience
recommended:
  knowledge_vault: true      # Second Brain (Obsidian integration)
  scheduler_conversacional: true  # Task scheduling via chat
  sense_news: true           # AI news curation by niche
  sherlock_news: true        # Tech launch monitoring
  bug_analyzer: true         # Bug analysis via chat
  skill_creator: true        # Auto-create skills from patterns

# 🔵 SPECIALIST — Business & advanced features
specialist:
  seeker_sales: false        # Unified BDR (B2B + Events)
  event_map_scout: false     # Predictive event mapping
  seeker_sales_week: false   # Weekly sales report
  email_monitor: false       # Inbox monitoring (requires IMAP)
  desktop_watch: false       # AFK screen surveillance (requires VLM)
  remote_executor: false     # Remote plan execution
  os_control: false          # Operating system control
  git_automation: false      # Auto-backup to GitHub
